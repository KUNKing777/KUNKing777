name: generate animation

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: KUNKing777
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?color_snake=green&color_dots=#ebedf0,#9be9a8,#40c463,#30a14e,#216e39&

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: \${{ secrets.GITHUB_TOKEN }}
