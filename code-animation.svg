<svg xmlns="http://www.w3.org/2000/svg" width="580" height="260" viewBox="0 0 580 260">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <style>
    @keyframes blink {
      0%, 45% { opacity: 1; }
      50%, 95% { opacity: 0; }
      100% { opacity: 1; }
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(2px); } to { opacity: 1; transform: translateY(0); } }

    text {
      font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'SF Mono', 'Consolas', monospace;
      font-size: 14px;
      font-weight: 500;
    }

    .window {
      fill: #282c34;
      rx: 10;
      stroke: #1e2127;
      stroke-width: 1;
    }
    .titlebar { fill: #21252b; }
    .dot-red { fill: #e06c75; }
    .dot-yellow { fill: #e5c07b; }
    .dot-green { fill: #98c379; }
    .filename { fill: #5c6370; font-size: 12px; }
    .line-num { fill: #4b5263; font-size: 13px; }

    .keyword { fill: #c678dd; }
    .func    { fill: #61afef; }
    .method  { fill: #61afef; }
    .param   { fill: #e06c75; }
    .punct   { fill: #abb2bf; }
    .closure { fill: #56b6c2; }
    .op      { fill: #abb2bf; }

    .cursor {
      fill: #528bff;
      animation: blink 1s step-end infinite;
    }

    .line { animation: fadeIn 0.4s ease-out both; }
    .l1 { animation-delay: 0.2s; }
    .l2 { animation-delay: 0.9s; }
    .l3 { animation-delay: 1.8s; }
    .l4 { animation-delay: 3.6s; }
    .l5 { animation-delay: 4.2s; }
    .l6 { animation-delay: 4.6s; }
  </style>

  <rect class="window" width="580" height="260" filter="url(#shadow)"/>
  <rect class="titlebar" width="580" height="36" rx="10"/>
  <rect class="titlebar" y="20" width="580" height="16"/>

  <circle cx="22" cy="18" r="6" class="dot-red"/>
  <circle cx="42" cy="18" r="6" class="dot-yellow"/>
  <circle cx="62" cy="18" r="6" class="dot-green"/>

  <text class="filename" x="260" y="22" text-anchor="middle" dominant-baseline="central">main.rs</text>

  <g class="line l1">
    <text class="line-num" x="28" y="68" text-anchor="end">1</text>
    <text x="44" y="68">
      <tspan class="keyword">fn</tspan>
      <tspan class="func"> main</tspan>
      <tspan class="punct">()</tspan>
      <tspan class="punct"> {</tspan>
    </text>
  </g>

  <g class="line l2">
    <text class="line-num" x="28" y="96" text-anchor="end">2</text>
    <text x="68" y="96">
      <tspan class="keyword">loop</tspan>
      <tspan class="punct"> {</tspan>
    </text>
  </g>

  <g class="line l3">
    <text class="line-num" x="28" y="124" text-anchor="end">3</text>
    <text x="92" y="124">
      <tspan class="keyword">let</tspan>
      <tspan class="param"> result</tspan>
      <tspan class="op"> =</tspan>
      <tspan class="method"> dream</tspan>
      <tspan class="punct">()</tspan>
      <tspan class="op">.</tspan>
      <tspan class="method">unwrap_or_else</tspan>
      <tspan class="punct">(</tspan>
      <tspan class="closure">|_|</tspan>
      <tspan class="method"> grind</tspan>
      <tspan class="punct">());</tspan>
    </text>
  </g>

  <g class="line l4">
    <text class="line-num" x="28" y="152" text-anchor="end">4</text>
    <text x="92" y="152">
      <tspan class="method">ship</tspan>
      <tspan class="punct">(</tspan>
      <tspan class="param">result</tspan>
      <tspan class="punct">);</tspan>
    </text>
  </g>

  <g class="line l5">
    <text class="line-num" x="28" y="180" text-anchor="end">5</text>
    <text x="68" y="180">
      <tspan class="punct">}</tspan>
    </text>
  </g>

  <g class="line l6">
    <text class="line-num" x="28" y="208" text-anchor="end">6</text>
    <text x="44" y="208">
      <tspan class="punct">}</tspan>
    </text>
    <rect x="58" y="194" width="2" height="18" rx="1" class="cursor"/>
  </g>
</svg>